name: release-manual-docs
on:
  workflow_dispatch:
    inputs:
      tag:
        default: ''
        description: 'Version tag (dart-#.#.# or flutter-#.#.#):'
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
env:
  package: ${{ startsWith(github.event.inputs.tag, 'dart') && 'dart' || 'flutter' }}
jobs:
  docs-publish:
    if: github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}
      - name: Setup dart
        uses: dart-lang/setup-dart@v1
      - name: Setup flutter
        if: env.package == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dart dependencies
        run: dart pub get --directory 'packages/dart'
      - name: Install flutter dependencies
        if: env.package == 'flutter'
        run: dart pub get --directory 'packages/flutter'
      - name: Generate Docs
        run: dart doc ./packages/${{ env.package }}/ -o ./.api_docs/${{ env.package }}/
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.api_docs/${{ env.package }}/
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
